name: Build NX616J Kernel

on:
  push:
    branches: [ main, master ]  # 根据你的默认分支调整
  pull_request:
  workflow_dispatch:  # 允许手动触发

env:
  KERNEL_DIR: android_kernel_nubia_sdm845
  DEFCONFIG: vendor/nubia_sdm845_defconfig
  ARCH: arm64
  CLANG_VERSION: r536225  # 对应 Clang 19.0.1
  JOBS: ${{ (runner.os == 'Linux' && 4) || 2 }}

jobs:
  build:
    runs-on: ubuntu-22.04  # 推荐使用较新 Ubuntu

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          path: ${{ env.KERNEL_DIR }}
          submodules: recursive

      - name: Set up Python (for some kernel scripts)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc \
            bison \
            build-essential \
            flex \
            libelf-dev \
            libssl-dev \
            lz4

      - name: Download AOSP Clang toolchain
        run: |
          mkdir -p prebuilts/clang/host/linux-x86
          cd prebuilts/clang/host/linux-x86
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/${{ env.CLANG_VERSION }}.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz
          mv android-* clang

      - name: Configure kernel
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          make O=out ARCH=${{ env.ARCH }} ${{ env.DEFCONFIG }}

      - name: Build kernel Image.gz-dtb
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          PATH="$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang/bin:$PATH" \
          make -j${{ env.JOBS }} O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            Image.gz-dtb

      - name: Check if kernel built successfully
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          ls -lh out/arch/arm64/boot/Image.gz-dtb

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: nx616j-kernel-${{ github.sha }}
          path: ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz-dtb
          retention-days: 7

      - name: Create Release (on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz-dtb
          tag_name: v$(date +%Y%m%d)-${{ github.sha }}
          name: Auto Build - ${{ github.sha }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
