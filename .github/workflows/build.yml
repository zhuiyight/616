name: Build ReSukiSU for Nubia X NX616J (No Compat vDSO)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install build dependencies (Clang 19 + arm32)
        run: |
          sudo apt update
          sudo apt install -y \
            git build-essential llvm lld clang-19 \
            python3 python3-pip zip \
            bc bison flex libssl-dev libelf-dev \
            gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100

      - name: Clone ReSukiSU
        uses: actions/checkout@v4
        with:
          repository: ReSukiSU/ReSukiSU
          path: ReSukiSU

      - name: Clone Nubia SDM845 kernel (Lineage-22.2)
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_nubia_sdm845
          ref: lineage-22.2
          path: android_kernel_nubia_sdm845

      - name: Patch kernel with ReSukiSU
        run: |
          cd android_kernel_nubia_sdm845
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s

      - name: Compile kernel (disable compat vDSO)
        run: |
          cd android_kernel_nubia_sdm845
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export LLVM=1
          export LD=ld.lld
          # 加载配置
          make ARCH=arm64 vendor/nubia/sdm845_defconfig
          # 核心修复：彻底禁用 32 位 compat vDSO，跳过链接失败
          scripts/config --disable CONFIG_COMPAT_VDSO
          # 修复栈保护选项
          scripts/config --disable CONFIG_CC_STACKPROTECTOR_STRONG
          scripts/config --enable CONFIG_CC_STACKPROTECTOR_REGULAR
          # 开始编译（不再需要 CROSS_COMPILE_ARM32）
          make ARCH=arm64 -j4 Image.lz4

      - name: Pack into AnyKernel3
        run: |
          mkdir -p ReSukiSU/out
          cp android_kernel_nubia_sdm845/arch/arm64/boot/Image.lz4 ReSukiSU/out/
          git clone https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          cp ../ReSukiSU/out/Image.lz4 .
          zip -r ../ReSukiSU-NX616J-Final.zip *

      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-NX616J-Final
          path: ReSukiSU-NX616J-Final.zip
