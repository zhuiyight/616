name: Build NX616J Kernel

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

env:
  KERNEL_DIR: .
  DEFCONFIG: vendor/nubia_sdm845_defconfig
  ARCH: arm64
  CLANG_VERSION: clang+llvm-19.0.1-x86_64-linux-gnu-ubuntu-22.04  # 与下载的文件名一致

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential curl flex gcc g++ git libssl-dev libtool make ninja-build python3 python3-pip wget zip zlib1g-dev

      - name: Download LLVM 19.0.1 Toolchain
        run: |
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-19.0.1/clang+llvm-19.0.1-x86_64-linux-gnu-ubuntu-22.04.tar.xz
          mkdir -p prebuilts/clang/host/linux-x86/clang
          tar -xJf clang+llvm-19.0.1-x86_64-linux-gnu-ubuntu-22.04.tar.xz -C prebuilts/clang/host/linux-x86/clang --strip-components=1
          prebuilts/clang/host/linux-x86/clang/bin/clang --version

      - name: Configure kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          make O=out ARCH=${{ env.ARCH }} CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- ${{ env.DEFCONFIG }}

      - name: Build kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          make -j$(nproc) O=out ARCH=${{ env.ARCH }} CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Upload kernel image
        uses: actions/upload-artifact@v4  # 升级到 v4 避免弃用错误
        with:
          name: kernel-image
          path: ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz-dtb
