name: Build Nubia SDM845 Kernel with ReSukiSU

on:
  workflow_dispatch:

env:
  DEVICE_CODENAME: "nx616j"
  KERNEL_SOURCE: "https://github.com/LineageOS/android_kernel_nubia_sdm845"
  KERNEL_BRANCH: "lineage-22.2"
  CLANG_SOURCE: "https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git"
  CLANG_BRANCH: "lineage-20.0"
  DEFCONFIG_NAME: "merged_defconfig"
  MERGE_CONFIG_FILES: "arch/arm64/configs/vendor/nubia/sdm845_defconfig,arch/arm64/configs/vendor/nubia/nx616j.config"
  # AnyKernel3 打包
  AK3_SOURCE: "https://github.com/osm0sis/AnyKernel3.git"
  AK3_BRANCH: "master"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget curl make flex bison \
            libncurses5-dev libssl-dev python3 libelf-dev bc cpio \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu ccache

      - name: Setup Clang
        run: |
          git clone --depth=1 ${{ env.CLANG_SOURCE }} -b ${{ env.CLANG_BRANCH }} clang
          echo "$(pwd)/clang/bin" >> $GITHUB_PATH

      - name: Setup GCC toolchains
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.git -b android12L-release gcc64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9.git -b android12L-release gcc32
          echo "$(pwd)/gcc64/bin" >> $GITHUB_PATH
          echo "$(pwd)/gcc32/bin" >> $GITHUB_PATH

      - name: Clone kernel source
        run: |
          git clone --depth=1 ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_BRANCH }} kernel

      - name: Apply ReSukiSU for non-GKI
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s nongki

      - name: Merge device configs
        run: |
          cd kernel
          scripts/kconfig/merge_config.sh -m $(echo ${{ env.MERGE_CONFIG_FILES }} | tr ',' ' ')
          mv .config arch/arm64/configs/${{ env.DEFCONFIG_NAME }}

      - name: Configure kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make ${{ env.DEFCONFIG_NAME }}
          scripts/config --enable KPROBES
          scripts/config --enable MODULES
          scripts/config --enable MODULE_UNLOAD
          scripts/config --disable DEBUG_INFO_BTF
          make olddefconfig

      - name: Build kernel and modules
        run: |
          cd kernel
          export ARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make -j$(nproc) Image.gz dtbs modules

      - name: Install modules
        run: |
          cd kernel
          export ARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make INSTALL_MOD_PATH=./modules_install modules_install

      - name: Prepare AnyKernel3
        run: |
          git clone --depth=1 ${{ env.AK3_SOURCE }} -b ${{ env.AK3_BRANCH }} anykernel3
          cp kernel/arch/arm64/boot/Image.gz anykernel3/
          # 复制设备树文件（若有）
          cp kernel/arch/arm64/boot/dts/qcom/*.dtb anykernel3/ 2>/dev/null || true
          # 解压模块到 anykernel3 的 modules 目录（可选）
          mkdir -p anykernel3/modules
          tar -xzf kernel/modules.tar.gz -C anykernel3/modules 2>/dev/null || true

      - name: Build flashable zip
        run: |
          cd anykernel3
          zip -r9 ${{ env.DEVICE_CODENAME }}-kernel-sukisu.zip *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nubia-sdm845-kernel-sukisu
          path: anykernel3/*.zip
