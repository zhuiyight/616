name: Build NX616J Kernel

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

env:
  KERNEL_DIR: .
  DEFCONFIG: vendor/nubia_sdm845_defconfig
  ARCH: arm64
  CLANG_VERSION: 19.0.1
  ANYKERNEL_REPO: https://github.com/your-username/AnyKernel3-nx616j.git

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set parallel jobs
        run: echo "JOBS=$(nproc)" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison build-essential curl flex \
            gcc g++ git libssl-dev libtool \
            make ninja-build python3 python3-pip \
            wget zip zlib1g-dev

      - name: Download AOSP Clang toolchain
        run: |
          mkdir -p prebuilts/clang/host/linux-x86/clang
          cd prebuilts/clang/host/linux-x86/clang
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-19.0.1/clang+llvm-19.0.1-x86_64-linux-gnu-ubuntu-22.04.tar.xz
          tar -xJf clang+llvm-19.0.1-x86_64-linux-gnu-ubuntu-22.04.tar.xz --strip-components=1

      - name: Configure kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          make O=out ${ARCH:+ARCH=${ARCH}} ${CROSS_COMPILE:+CROSS_COMPILE=${CROSS_COMPILE}} ${DEFCONFIG}

      - name: Build kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          make -j${{ env.JOBS }} O=out \
            ${ARCH:+ARCH=${ARCH}} \
            ${CROSS_COMPILE:+CROSS_COMPILE=${CROSS_COMPILE}} \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Upload kernel image
        uses: actions/upload-artifact@v3
        with:
          name: kernel-image
          path: ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz-dtb
