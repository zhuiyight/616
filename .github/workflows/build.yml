name: 内核编译工作流（sdm845）
on:
  push:
    branches: [ lineage-22.2 ]
    paths:
      - 'kernel/nubia/sdm845/**'  # 仅内核目录变更时触发
  pull_request:
    branches: [ lineage-22.2 ]
    paths:
      - 'kernel/nubia/sdm845/**'
  workflow_dispatch:  # 支持手动触发

jobs:
  build-kernel:
    runs-on: ubuntu-20.04  # 兼容编译环境依赖
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: 安装依赖工具链
        run: |
          sudo apt update && sudo apt install -y \
            git repo openjdk-11-jdk android-sdk-platform-tools \
            build-essential flex bison python3-dev python3-pip \
            libssl-dev liblz4-tool zlib1g-dev libncurses5-dev \
            crossbuild-essential-arm64

      - name: 初始化编译环境
        run: |
          # 配置 repo 工具
          mkdir -p ~/bin && curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo && export PATH=~/bin:$PATH
          
          # 初始化 LineageOS 源码环境（仅同步内核相关依赖）
          repo init -u https://github.com/LineageOS/android.git -b lineage-22.2 --depth=1
          echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>" > .repo/local_manifests/kernel.xml
          echo "<manifest>" >> .repo/local_manifests/kernel.xml
          echo "  <project path=\"kernel/nubia/sdm845\" name=\"LineageOS/android_kernel_nubia_sdm845\" remote=\"github\" revision=\"lineage-22.2\" />" >> .repo/local_manifests/kernel.xml
          echo "  <project path=\"device/nubia/sdm845-common\" name=\"LineageOS/android_device_nubia_sdm845-common\" remote=\"github\" revision=\"lineage-22.2\" />" >> .repo/local_manifests/kernel.xml
          echo "  <project path=\"hardware/nubia\" name=\"LineageOS/android_hardware_nubia\" remote=\"github\" revision=\"lineage-22.2\" />" >> .repo/local_manifests/kernel.xml
          echo "</manifest>" >> .repo/local_manifests/kernel.xml
          
          # 同步依赖（仅拉取必要文件，加速流程）
          repo sync -j$(nproc) --no-clone-bundle --depth=1

      - name: 加载交叉编译工具链
        run: |
          # 配置 arm64 交叉编译器
          export CROSS_COMPILE=aarch64-linux-android-
          export ARCH=arm64
          export PATH=$PATH:/usr/bin
          echo "CROSS_COMPILE=$CROSS_COMPILE" >> $GITHUB_ENV
          echo "ARCH=$ARCH" >> $GITHUB_ENV

      - name: 编译内核
        run: |
          cd kernel/nubia/sdm845
          # 加载设备默认配置
          make lineage_nx616j_defconfig
          # 多线程编译内核镜像（Image.gz-dtb 为最终产物）
          make -j$(nproc) Image.gz-dtb

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-sdm845
          path: |
            kernel/nubia/sdm845/arch/arm64/boot/Image.gz-dtb
            kernel/nubia/sdm845/.config  # 编译配置文件
          retention-days: 7  # 产物保留7天
