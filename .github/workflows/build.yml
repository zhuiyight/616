name: Build LineageOS Kernel

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (remove out/ before start)'
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        repository: LineageOS/android_kernel_nubia_sdm845
        ref: lineage-22.2
        path: kernel

    - name: Set up build environment
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential curl flex git gnupg gperf liblz4-tool \
          libncurses5-dev libssl-dev lzop pngcrush rsync schedtool squashfs-tools xsltproc \
          zip zlib1g-dev libxml2 libxml2-utils openjdk-11-jdk python3 python-is-python3

    # 缓存工具链（加速后续构建）
    - name: Cache toolchains
      id: cache-toolchains
      uses: actions/cache@v4
      with:
        path: toolchain
        key: toolchain-${{ runner.os }}-lineage19.1

    - name: Get Clang toolchain (LineageOS)
      if: steps.cache-toolchains.outputs.cache-hit != 'true'
      run: |
        git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_clang_host_linux-x86 toolchain/clang

    - name: Get GCC cross-compiler (LineageOS)
      if: steps.cache-toolchains.outputs.cache-hit != 'true'
      run: |
        git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 toolchain/gcc

    # 可选：验证工具链版本
    - name: Verify toolchain versions
      run: |
        echo "Clang version:"
        toolchain/clang/bin/clang --version | head -n1
        echo "GCC version:"
        toolchain/gcc/bin/aarch64-linux-android-gcc --version | head -n1

    - name: Merge kernel configs
      working-directory: kernel
      run: |
        if [ "${{ github.event.inputs.clean_build }}" == "true" ]; then
          rm -rf out
        fi
        cp arch/arm64/configs/vendor/nubia/sdm845_defconfig .config
        scripts/kconfig/merge_config.sh -m -O . .config arch/arm64/configs/vendor/nubia/nx616j.config
        make ARCH=arm64 olddefconfig

    - name: Build kernel
      working-directory: kernel
      env:
        PATH: ${{ github.workspace }}/toolchain/clang/bin:${{ github.workspace }}/toolchain/gcc/bin:$PATH
        LD_LIBRARY_PATH: ${{ github.workspace }}/toolchain/clang/lib:$LD_LIBRARY_PATH
      run: |
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-

        # 编译内核镜像和模块
        make -j$(nproc) ARCH=arm64 \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          READELF=llvm-readelf \
          STRIP=llvm-strip \
          LLVM=1 \
          LLVM_IAS=1 \
          Image.gz-dtb modules

    - name: Package kernel artifacts
      run: |
        mkdir -p kernel_artifacts
        # 复制内核镜像
        cp kernel/arch/arm64/boot/Image.gz-dtb kernel_artifacts/
        # 安装模块并打包
        mkdir -p kernel_modules
        make -C kernel ARCH=arm64 \
          INSTALL_MOD_PATH=${{ github.workspace }}/kernel_modules \
          modules_install
        cd kernel_modules && tar czf ../kernel_artifacts/modules.tar.gz . && cd ..

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lineage-kernel
        path: kernel_artifacts/
