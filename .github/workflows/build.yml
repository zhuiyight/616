name: Build SDM845 Kernel with ReSukiSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget curl make flex bison \
            libncurses5-dev libssl-dev python3 libelf-dev bc cpio \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            clang-14 lld-14 llvm-14 dwarves ccache
          # 设置默认 clang/ld.lld 版本
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-14 100
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-14 100

      - name: Clone kernel source
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_nubia_sdm845.git -b lineage-22.2 kernel

      - name: Apply ReSukiSU
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash

      - name: Merge device-specific configs
        run: |
          cd kernel
          # 合并基础 SoC 配置和机型配置
          scripts/kconfig/merge_config.sh -m arch/arm64/configs/vendor/nubia/sdm845_defconfig \
                                           arch/arm64/configs/vendor/nubia/nx616j.config
          mv .config arch/arm64/configs/merged_defconfig

      - name: Configure kernel
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          # 使用合并后的配置
          make merged_defconfig
          # 关闭 BTF 以加快编译（可选）
          scripts/config --disable DEBUG_INFO_BTF
          make olddefconfig

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          # 编译内核映像和设备树
          make -j$(nproc) Image.gz dtbs

      - name: Prepare artifacts
        run: |
          cd kernel
          mkdir -p out
          cp arch/arm64/boot/Image.gz out/
          cp arch/arm64/boot/dts/qcom/*.dtb out/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdm845-kernel-with-sukisu
          path: kernel/out/
