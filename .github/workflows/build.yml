name: Build Nubia SDM845 Kernel with ReSukiSU (non-GKI)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget curl make flex bison \
            libncurses5-dev libssl-dev python3 libelf-dev bc cpio \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            clang-14 lld-14 llvm-14 dwarves ccache
          # 设置默认 clang/ld.lld 版本
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-14 100
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-14 100

      - name: Clone kernel source
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_nubia_sdm845.git -b lineage-22.2 kernel

      - name: Apply ReSukiSU for non-GKI
        run: |
          cd kernel
          # 关键：non-GKI 必须使用 nongki 参数
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s nongki
          # 如果需要 SUSFS 实验性功能，可替换为：
          # curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s susfs-main

      - name: Prepare configuration
        run: |
          cd kernel
          # 复制设备基础配置（该内核使用 vendor/nubia 下的配置）
          # 注意：这个内核没有独立的 defconfig，需要直接使用 sdm845_defconfig + nx616j.config
          # 但由于 merge_config.sh 可能要求特定路径，我们手动合并
          scripts/kconfig/merge_config.sh -m arch/arm64/configs/vendor/nubia/sdm845_defconfig \
                                           arch/arm64/configs/vendor/nubia/nx616j.config
          mv .config arch/arm64/configs/merged_defconfig

      - name: Configure kernel
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          # 使用合并后的配置
          make merged_defconfig
          # 确保 non-GKI 所需的选项开启
          scripts/config --enable KPROBES
          scripts/config --enable MODULES
          scripts/config --enable MODULE_UNLOAD
          # 可选：开启 tracepoint hook（如果 ReSukiSU 需要）
          # scripts/config --enable KSU_TRACEPOINT_HOOK
          # 关闭 BTF（4.9 内核不支持）
          scripts/config --disable DEBUG_INFO_BTF
          make olddefconfig

      - name: Build kernel and modules
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          # non-GKI 需要编译模块
          make -j$(nproc) Image.gz dtbs modules

      - name: Install modules
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          # 将模块安装到临时目录
          make INSTALL_MOD_PATH=./modules_install modules_install

      - name: Prepare artifacts
        run: |
          cd kernel
          mkdir -p out
          # 内核映像
          cp arch/arm64/boot/Image.gz out/
          # 设备树 blob（若有）
          cp arch/arm64/boot/dts/qcom/*.dtb out/ 2>/dev/null || true
          # 内核模块（打包）
          tar -czf out/modules.tar.gz -C modules_install/lib/modules .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nubia-sdm845-kernel-with-sukisu
          path: kernel/out/
