name: Build Kernel SDM845 (Clang r536225 - Pure LLVM Mode)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl \
            zlib1g-dev libssl-dev bc device-tree-compiler python3 libncurses5-dev

      - name: Preparation and Compiling
        run: |
          mkdir -p workspace && cd workspace

          # 1. 仅下载 Clang r536225 (不再依赖 GCC 辅助汇编)
          mkdir -p clang-aosp
          curl -LSs "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz" | tar -C clang-aosp -zxf -

          # 2. 克隆内核源码
          git clone https://github.com/LineageOS/android_kernel_nubia_sdm845 -b lineage-22.2 kernel --depth 1
          cd kernel

          # 3. 混合 Defconfig
          cat arch/arm64/configs/vendor/nubia/sdm845_defconfig \
              arch/arm64/configs/vendor/nubia/nx616j.config \
              > arch/arm64/configs/lineage_nx616j_defconfig

          # 4. 执行编译
          export PATH="$GITHUB_WORKSPACE/workspace/clang-aosp/bin:$PATH"
          
          # 核心变动：移除 LLVM_IAS=0，移除所有干扰参数
          # LLVM=1 会默认开启 LLVM 所有的替代工具（clang, ld.lld, llvm-objcopy 等）
          MAKE_PARAMS="O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- \
                       LD=ld.lld LLVM=1"

          # 步骤 A: 生成配置
          make -j$(nproc) $MAKE_PARAMS lineage_nx616j_defconfig
          
          # 步骤 B: 开始正式编译
          make -j$(nproc) $MAKE_PARAMS

      - name: Upload Logs (If failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Failure-Logs
          path: workspace/kernel/out/
