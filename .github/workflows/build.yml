name: Build NX616J Kernel

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

env:
  KERNEL_DIR: .
  DEFCONFIG: vendor/nubia_sdm845_defconfig
  ARCH: arm64
  # 使用 LLVM 官方 Release 名称
  CLANG_VERSION: clang+llvm-19.0.1-x86_64-linux-gnu-ubuntu-22.04

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 🛎️ Checkout kernel source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ⚙️ Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison build-essential curl flex \
            gcc g++ git libssl-dev libtool \
            make ninja-build python3 python3-pip \
            wget zip zlib1g-dev cpio

      - name: 📦 Download LLVM 19.0.1 Toolchain
        run: |
          # 下载并解压 Clang
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-19.0.1/${{ env.CLANG_VERSION }}.tar.xz
          sudo tar -xJf ${CLANG_VERSION}.tar.xz -C /usr/local --strip-components=1
          # 验证安装
          clang --version

      - name: 📝 Configure kernel
        run: |
          make O=out ARCH=${{ env.ARCH }} ${CROSS_COMPILE:+CROSS_COMPILE=${CROSS_COMPILE}} ${{ env.DEFCONFIG }}

      - name: 🏗️ Build kernel
        run: |
          make -j$(nproc) O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            Image.gz-dtb

      - name: 📤 Upload kernel artifact (Fixed v4)
        uses: actions/upload-artifact@v4  # 关键修复：升级到 v4
        with:
          name: NX616J-Kernel
          path: out/arch/arm64/boot/Image.gz-dtb  # 修正路径，确保能找到文件
          retention-days: 7
