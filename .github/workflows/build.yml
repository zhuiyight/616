name: Build Nubia SDM845 Kernel with ReSukiSU (non-GKI)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget curl make flex bison \
            libncurses5-dev libssl-dev python3 libelf-dev bc cpio \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            ccache

      - name: Setup custom Clang
        run: |
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20250721-release/Clang-16.0.6-20250721.tar.gz
          tar -xf Clang-16.0.6-20250721.tar.gz
          extracted_dir=$(find . -maxdepth 1 -type d -name "Clang*" | head -1)
          if [ -z "$extracted_dir" ]; then
            echo "Error: Cannot find extracted directory"
            exit 1
          fi
          echo "Extracted directory: $extracted_dir"
          sudo mv "$extracted_dir" /opt/clang-16.0.6
          echo "/opt/clang-16.0.6/bin" >> $GITHUB_PATH
          /opt/clang-16.0.6/bin/clang --version

      - name: Clone kernel source
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_nubia_sdm845.git -b lineage-22.2 kernel

      - name: Apply ReSukiSU for non-GKI
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s nongki

      - name: Prepare configuration
        run: |
          cd kernel
          scripts/kconfig/merge_config.sh -m arch/arm64/configs/vendor/nubia/sdm845_defconfig \
                                           arch/arm64/configs/vendor/nubia/nx616j.config
          mv .config arch/arm64/configs/merged_defconfig

      - name: Configure kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          make merged_defconfig
          scripts/config --enable KPROBES
          scripts/config --enable MODULES
          scripts/config --enable MODULE_UNLOAD
          scripts/config --disable DEBUG_INFO_BTF
          make olddefconfig

      - name: Build kernel and modules
        run: |
          cd kernel
          export ARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          make -j$(nproc) Image.gz dtbs modules

      - name: Install modules
        run: |
          cd kernel
          export ARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          make INSTALL_MOD_PATH=./modules_install modules_install

      - name: Prepare artifacts
        run: |
          cd kernel
          mkdir -p out
          cp arch/arm64/boot/Image.gz out/
          cp arch/arm64/boot/dts/qcom/*.dtb out/ 2>/dev/null || true
          tar -czf out/modules.tar.gz -C modules_install/lib/modules .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nubia-sdm845-kernel-with-sukisu
          path: kernel/out/
