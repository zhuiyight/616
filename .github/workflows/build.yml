name: Build Kernel SDM845 with SukiSU-Ultra (Deep-Force-Fix)
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git automake flex lzop bison build-essential zip curl \
            bc libssl-dev device-tree-compiler python3 libncurses-dev ccache

      - name: 缓存管理
        uses: actions/cache@v4
        with:
          path: |
            clang-aosp
            gcc64
            gcc32
            ~/.ccache
          key: ${{ runner.os }}-kernel-ccache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: 准备工具链
        run: |
          if [ ! -d "clang-aosp" ]; then
            mkdir -p clang-aosp gcc64 gcc32
            wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz
            tar -C clang-aosp/ -zxf clang-r536225.tar.gz
            wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz -O gcc64.tar.gz
            tar -C gcc64/ -zxf gcc64.tar.gz
            wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz -O gcc32.tar.gz
            tar -C gcc32/ -zxf gcc32.tar.gz
          fi

      - name: 同步内核源码
        run: |
          if [ ! -d "android-kernel" ]; then
            git clone https://github.com/LineageOS/android_kernel_nubia_sdm845 -b lineage-22.2 android-kernel --depth 1
          fi

      - name: 集成 SukiSU-Ultra 驱动
        run: |
          cd android-kernel
          if [ ! -d "drivers/kernelsu" ] && [ ! -d "ksu" ]; then
            curl -LSs https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh | bash -s main
          fi

      - name: 执行 Non-GKI 必要修补
        run: |
          cd android-kernel
          # 1. 导出 sys_call_table
          if ! grep -q "EXPORT_SYMBOL(sys_call_table)" arch/arm64/kernel/sys.c; then
            echo '#include <linux/syscalls.h>' >> arch/arm64/kernel/sys.c
            echo 'EXPORT_SYMBOL(sys_call_table);' >> arch/arm64/kernel/sys.c
          fi
          # 2. 注入类型定义
          sed -i '/asmlinkage long sys_ni_syscall(void);/a typedef long (*syscall_fn_t)(const struct pt_regs *);' include/linux/syscalls.h || true
          # 3. 修复 patch_memory.c
          PATCH_MEM=$(find drivers -name "patch_memory.c")
          if [ -n "$PATCH_MEM" ]; then
            sed -i 's/p4d_t \*p4d;//g' "$PATCH_MEM"
            sed -i 's/p4d = p4d_offset(pgd, addr);//g' "$PATCH_MEM"
            sed -i 's/if (p4d_none(\*p4d) || p4d_bad(\*p4d))/if (0)/g' "$PATCH_MEM"
            sed -i 's/pud = pud_offset(p4d, addr);/pud = pud_offset(pgd, addr);/g' "$PATCH_MEM"
            sed -i 's/__flush_icache_range/flush_icache_range/g' "$PATCH_MEM"
          fi
          # 4. 禁用不兼容模块
          KSU_MAKEFILES=$(find drivers -name "Makefile" | xargs grep -l "pkg_observer.o" || true)
          if [ -n "$KSU_MAKEFILES" ]; then
            for f in $KSU_MAKEFILES; do
              sed -i 's/obj-y += pkg_observer.o/# obj-y += pkg_observer.o/g' "$f"
              sed -i 's/ksu-y += pkg_observer.o/# ksu-y += pkg_observer.o/g' "$f"
            done
          fi

      - name: 编译内核 (Deep-Force 模式)
        run: |
          cd android-kernel
          
          mkdir -p bin
          ln -sf /usr/bin/ccache bin/clang
          ln -sf /usr/bin/ccache bin/gcc
          export PATH=$GITHUB_WORKSPACE/android-kernel/bin:$GITHUB_WORKSPACE/clang-aosp/bin:$PATH
          
          GCC64=$GITHUB_WORKSPACE/gcc64/bin/aarch64-linux-android-
          GCC32=$GITHUB_WORKSPACE/gcc32/bin/arm-linux-androideabi-
          
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          ccache -M 5G
          
          rm -rf out
          mkdir -p out
          
          MAKE_ARGS="ARCH=arm64 O=out CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=$GCC64 CROSS_COMPILE_ARM32=$GCC32 LD=ld.lld LLVM=1 LLVM_IAS=1 KCFLAGS=-Wno-error"
          
          # 1. 先生成原始配置
          make $MAKE_ARGS vendor/nubia/sdm845_defconfig
          ARCH=arm64 ./scripts/kconfig/merge_config.sh -O out/ out/.config arch/arm64/configs/vendor/nubia/nx616j.config
          
          # 2. 【核心修改】在所有合并完成后，强行追加配置，并使用 sed 确保没有重复冲突
          sed -i '/CONFIG_KSU/d' out/.config
          echo "CONFIG_KSU=y" >> out/.config
          echo "CONFIG_KSU_SUCOMPAT=y" >> out/.config
          echo "CONFIG_KSU_DEBUG=n" >> out/.config
          
          # 3. 强制刷新，如果 grep 没找到也不要报错 (加 || true)
          make $MAKE_ARGS olddefconfig
          echo "--- KSU CONFIG CHECK ---"
          grep "CONFIG_KSU" out/.config || true
          
          # 4. 再次强制确认（有些内核 Makefile 会在编译开始时重置配置）
          # 我们直接把参数带入 make 指令
          make -j$(nproc --all) $MAKE_ARGS CONFIG_KSU=y CONFIG_KSU_SUCOMPAT=y Image.gz-dtb
          
          ccache -s

      - name: 打包产物
        run: |
          cd android-kernel/out/arch/arm64/boot/
          if [ -f Image.gz-dtb ]; then
            zip -j kernel-nx616j-sukisu.zip Image.gz-dtb
          elif [ -f Image.gz ]; then
            zip -j kernel-nx616j-sukisu.zip Image.gz
          fi

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: SukiSU-Ultra-NX616J-Force
          path: android-kernel/out/arch/arm64/boot/*.zip
